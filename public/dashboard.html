<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Bugiboni Entrepreneurs - Dashboard</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bugiboni Dashboard">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* Dashboard specific styles */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--card-bg), var(--background));
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-fast);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(46,125,50,0.1) 0%, transparent 70%);
            transition: transform var(--transition-slow);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-card:hover::before {
            transform: scale(1.1);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-sm);
            color: var(--primary-color);
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1.2;
        }
        
        .stat-change {
            font-size: 0.85rem;
            margin-top: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .stat-change.positive {
            color: var(--success-color);
        }
        
        .stat-change.negative {
            color: var(--danger-color);
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .chart-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }
        
        .chart-card h3 {
            margin-bottom: var(--spacing-md);
            color: var(--primary-color);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .recent-activity {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-xl);
        }
        
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }
        
        .activity-header h3 {
            margin: 0;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .activity-filters {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        
        .activity-filters select,
        .activity-filters input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
        }
        
        .activity-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .activity-table th {
            text-align: left;
            padding: var(--spacing-md);
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .activity-table td {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .activity-table tr:hover td {
            background: var(--background);
        }
        
        .transaction-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .type-deposit {
            background: var(--success-light);
            color: var(--success-dark);
        }
        
        .type-withdrawal {
            background: var(--warning-light);
            color: var(--warning-dark);
        }
        
        .member-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-soft);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }
        
        .member-badge img {
            width: 20px;
            height: 20px;
            border-radius: var(--radius-circle);
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        
        .action-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 2px solid transparent;
        }
        
        .action-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        .action-icon {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-sm);
        }
        
        .action-title {
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: var(--spacing-xs);
        }
        
        .action-desc {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .member-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
        
        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            transition: background var(--transition-fast);
        }
        
        .member-item:hover {
            background: var(--background);
        }
        
        .member-item:last-child {
            border-bottom: none;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-circle);
            background: var(--primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .member-info {
            flex: 1;
            margin-left: var(--spacing-md);
        }
        
        .member-name {
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .member-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            gap: var(--spacing-md);
        }
        
        .member-role-badge {
            background: var(--primary-soft);
            color: var(--primary-dark);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            text-transform: capitalize;
        }
        
        .member-balance {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--spacing-xs);
            margin-top: var(--spacing-lg);
            flex-wrap: wrap;
        }
        
        .page-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .page-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary-color);
        }
        
        .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .date-range-picker {
            display: flex;
            gap: var(--spacing-sm);
            align-items: center;
            flex-wrap: wrap;
        }
        
        .date-range-picker input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
        
        .export-buttons {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-bottom: var(--spacing-md);
        }
        
        .export-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--background);
            color: var(--text-color);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .export-btn:hover {
            background: var(--primary-soft);
        }
        
        .export-btn.pdf {
            background: #dc3545;
            color: white;
        }
        
        .export-btn.excel {
            background: #28a745;
            color: white;
        }
        
        .export-btn.csv {
            background: #17a2b8;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-light);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .activity-table {
                display: block;
                overflow-x: auto;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .activity-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .date-range-picker {
                flex-direction: column;
                align-items: stretch;
            }
            
            .export-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="logo-container">
                <img src="icons/icon-72x72.png" alt="Bugiboni" class="header-logo">
                <h2>Bugiboni Savings</h2>
            </div>
            <div class="header-actions">
                <button id="refreshBtn" class="menu-toggle" title="Refresh Data">🔄</button>
                <button id="menuToggle" class="menu-toggle" aria-label="Menu">☰</button>
            </div>
        </div>
    </header>

    <!-- Side Menu -->
    <nav id="sideMenu" class="side-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <button id="closeMenu" class="close-menu">✕</button>
        </div>
        <ul class="menu-items" id="menuItems">
            <!-- Menu items will be populated by JavaScript -->
        </ul>
        <div class="menu-footer">
            <div id="userInfo" class="user-info">
                <div class="user-details">
                    <strong id="userDisplayName">Loading...</strong>
                    <span id="userRole" class="user-role">Loading...</span>
                </div>
            </div>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
    </nav>

    <!-- Menu Overlay -->
    <div id="menuOverlay" class="menu-overlay"></div>

    <!-- Main Dashboard Content -->
    <div class="dashboard-container">
        <!-- Welcome Section -->
        <div class="welcome-section">
            <h1 id="welcomeMessage">Welcome to Your Dashboard</h1>
            <p id="currentDateTime" class="text-muted"></p>
        </div>

        <!-- Stats Grid - Will be populated based on role -->
        <div id="statsGrid" class="stats-grid">
            <!-- Stats will be loaded here -->
        </div>

        <!-- Quick Actions -->
        <div id="quickActions" class="quick-actions">
            <!-- Quick actions will be loaded here -->
        </div>

        <!-- Charts Section -->
        <div id="chartsSection" class="charts-grid" style="display: none;">
            <!-- Charts will be loaded based on role -->
        </div>

        <!-- Recent Activity Section -->
        <div id="recentActivity" class="recent-activity">
            <div class="activity-header">
                <h3>
                    <span>📋</span>
                    <span id="activityTitle">Recent Activity</span>
                </h3>
                <div class="activity-filters">
                    <select id="activityFilter">
                        <option value="all">All Transactions</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search...">
                </div>
            </div>
            
            <!-- Export Buttons -->
            <div class="export-buttons">
                <button class="export-btn csv" onclick="exportData('csv')">
                    <span>📊</span> Export CSV
                </button>
                <button class="export-btn excel" onclick="exportData('excel')">
                    <span>📑</span> Export Excel
                </button>
                <button class="export-btn pdf" onclick="exportData('pdf')">
                    <span>📄</span> Export PDF
                </button>
            </div>
            
            <!-- Activity Table -->
            <div class="table-responsive">
                <table class="activity-table" id="activityTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Member</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Recorded By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="loading-spinner"></div>
                                <p>Loading activities...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div id="pagination" class="pagination">
                <!-- Pagination will be loaded here -->
            </div>
        </div>

        <!-- Members List Section (for leadership roles) -->
        <div id="membersSection" class="recent-activity" style="display: none;">
            <div class="activity-header">
                <h3>
                    <span>👥</span>
                    <span>Members Directory</span>
                </h3>
                <div class="activity-filters">
                    <input type="text" id="memberSearch" placeholder="Search members...">
                    <select id="roleFilter">
                        <option value="all">All Roles</option>
                        <option value="member">Members</option>
                        <option value="treasurer">Treasurer</option>
                        <option value="chairperson">Chairperson</option>
                    </select>
                </div>
            </div>
            
            <div id="membersList" class="member-list">
                <!-- Members will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <!-- Navigation items will be populated -->
    </nav>

    <!-- Transaction Modal (for recording deposits) -->
    <div id="transactionModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Record New Deposit</h3>
                <button class="modal-close" onclick="closeModal('transactionModal')">✕</button>
            </div>
            <div class="modal-body">
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="modalMemberId">Select Member</label>
                        <select id="modalMemberId" required onchange="updateMemberName()">
                            <option value="">Choose member...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="modalMemberName">Member Name</label>
                        <input type="text" id="modalMemberName" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="modalAmount">Amount (UGX)</label>
                        <input type="number" id="modalAmount" min="100" step="100" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="modalDate">Date</label>
                        <input type="date" id="modalDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="modalNotes">Notes</label>
                        <textarea id="modalNotes" placeholder="Optional notes about payment"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('transactionModal')">Cancel</button>
                <button class="btn-primary" onclick="submitTransaction()">Record Deposit</button>
            </div>
        </div>
    </div>

    <!-- User Modal (for adding/editing users) -->
    <div id="userModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userModalTitle">Add New User</h3>
                <button class="modal-close" onclick="closeModal('userModal')">✕</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userUsername">Username</label>
                        <input type="text" id="userUsername" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userPassword">Password</label>
                        <input type="password" id="userPassword" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userRole">Role</label>
                        <select id="userRole" required>
                            <option value="">Select Role...</option>
                            <option value="member">Member</option>
                            <option value="treasurer">Treasurer</option>
                            <option value="secretary">Secretary</option>
                            <option value="welfare">Welfare</option>
                            <option value="discipline">Discipline</option>
                            <option value="projects">Projects</option>
                            <option value="chairperson">Chairperson</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="userWhatsapp">WhatsApp Number</label>
                        <input type="tel" id="userWhatsapp" placeholder="+256XXXXXXXXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userEmail">Email (Optional)</label>
                        <input type="email" id="userEmail">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('userModal')">Cancel</button>
                <button class="btn-primary" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>Generate Report</h3>
                <button class="modal-close" onclick="closeModal('reportModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Report Type</label>
                    <select id="reportType">
                        <option value="individual">Individual Member Statement</option>
                        <option value="group">Group Summary</option>
                        <option value="monthly">Monthly Contribution Report</option>
                        <option value="transaction">Transaction Log</option>
                    </select>
                </div>
                
                <div id="reportMemberSelect" class="form-group">
                    <label>Select Member</label>
                    <select id="reportMemberId">
                        <option value="">Choose member...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date Range</label>
                    <div class="date-range-picker">
                        <input type="date" id="reportStartDate">
                        <span>to</span>
                        <input type="date" id="reportEndDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Format</label>
                    <select id="reportFormat">
                        <option value="pdf">PDF</option>
                        <option value="excel">Excel</option>
                        <option value="csv">CSV</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
                <button class="btn-primary" onclick="generateReport()">Generate Report</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    
    <script>
        // Main dashboard initialization
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            if (!window.auth.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }
            
            // Get current user
            const user = window.auth.getUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            
            // Initialize dashboard
            await initializeDashboard(user);
            
            // Set up event listeners
            setupEventListeners();
            
            // Load initial data
            await loadDashboardData();
            
            // Update date/time
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });

        // Initialize dashboard based on user role
        async function initializeDashboard(user) {
            console.log('Initializing dashboard for:', user.name);
            
            // Update welcome message
            document.getElementById('welcomeMessage').textContent = 
                `Welcome back, ${user.name || user.username}!`;
            
            // Update user info in menu
            document.getElementById('userDisplayName').textContent = user.name || user.username;
            document.getElementById('userRole').textContent = formatRole(user.role);
            
            // Load role-specific content
            await loadRoleContent(user.role);
            
            // Show/hide sections based on role
            configureDashboardForRole(user.role);
        }

        // Format role name
        function formatRole(role) {
            return role.charAt(0).toUpperCase() + role.slice(1);
        }

        // Configure dashboard based on role
        function configureDashboardForRole(role) {
            const chartsSection = document.getElementById('chartsSection');
            const membersSection = document.getElementById('membersSection');
            
            // Show charts for admin, chairperson, treasurer
            if (['admin', 'chairperson', 'treasurer'].includes(role)) {
                chartsSection.style.display = 'grid';
            }
            
            // Show members section for leadership roles
            if (['admin', 'chairperson', 'secretary', 'welfare', 'discipline', 'projects'].includes(role)) {
                membersSection.style.display = 'block';
                loadMembersList();
            }
        }

        // Update date and time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
        }

        // Set up event listeners
        function setupEventListeners() {
            // Menu toggle
            document.getElementById('menuToggle').addEventListener('click', toggleMenu);
            document.getElementById('closeMenu').addEventListener('click', toggleMenu);

        // Debounce function for search inputs
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Load recent activity
        async function loadRecentActivity(page = 1) {
            try {
                const user = window.auth.getUser();
                let transactions = [];
                
                if (user.role === 'member') {
                    const report = await API.getIndividualReport(user.id);
                    transactions = report.transactions || [];
                } else {
                    transactions = await API.getTransactions();
                }
                
                // Apply filters
                const filter = document.getElementById('activityFilter').value;
                const search = document.getElementById('searchInput').value.toLowerCase();
                
                let filtered = transactions;
                
                // Apply date filter
                if (filter !== 'all') {
                    const now = new Date();
                    filtered = filtered.filter(t => {
                        const date = new Date(t.date);
                        switch(filter) {
                            case 'today':
                                return date.toDateString() === now.toDateString();
                            case 'week':
                                const weekAgo = new Date(now.setDate(now.getDate() - 7));
                                return date >= weekAgo;
                            case 'month':
                                const monthAgo = new Date(now.setMonth(now.getMonth() - 1));
                                return date >= monthAgo;
                            default:
                                return true;
                        }
                    });
                }
                
                // Apply search
                if (search) {
                    filtered = filtered.filter(t => 
                        t.memberName?.toLowerCase().includes(search) ||
                        t.notes?.toLowerCase().includes(search) ||
                        t.amount.toString().includes(search)
                    );
                }
                
                // Sort by date (newest first)
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // Pagination
                const itemsPerPage = 10;
                const totalPages = Math.ceil(filtered.length / itemsPerPage);
                const start = (page - 1) * itemsPerPage;
                const paginated = filtered.slice(start, start + itemsPerPage);
                
                // Render table
                const tbody = document.getElementById('activityBody');
                
                if (paginated.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📭</div>
                                    <p>No transactions found</p>
                                </div>
                            </td>
                        </tr>
                    `;
                } else {
                    tbody.innerHTML = paginated.map(t => `
                        <tr>
                            <td>${new Date(t.date).toLocaleDateString()}</td>
                            <td>
                                <div class="member-badge">
                                    <span>${t.memberName}</span>
                                </div>
                            </td>
                            <td>
                                <span class="transaction-type type-deposit">Deposit</span>
                            </td>
                            <td><strong>UGX ${t.amount.toLocaleString()}</strong></td>
                            <td>${t.recordedByName || 'System'}</td>
                            <td>
                                <button class="btn-secondary" style="padding: 4px 8px;" onclick="viewTransaction('${t.id}')">
                                    View
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
                
                // Render pagination
                renderPagination(page, totalPages);
                
            } catch (error) {
                console.error('Error loading recent activity:', error);
                document.getElementById('activityBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center">
                            <div class="error-message">Failed to load transactions</div>
                        </td>
                    </tr>
                `;
            }
        }

        // Render pagination
        function renderPagination(currentPage, totalPages) {
            const pagination = document.getElementById('pagination');
            let html = '';
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadRecentActivity(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="page-btn">...</span>`;
                }
            }
            
            pagination.innerHTML = html;
        }

        // Submit transaction
        async function submitTransaction() {
            const formData = {
                memberId: document.getElementById('modalMemberId').value,
                memberName: document.getElementById('modalMemberName').value,
                amount: parseFloat(document.getElementById('modalAmount').value),
                date: document.getElementById('modalDate').value,
                notes: document.getElementById('modalNotes').value
            };
            
            // Validate
            if (!formData.memberId || !formData.amount || !formData.date) {
                window.auth.showNotification('Please fill all required fields', 'error');
                return;
            }
            
            try {
                const result = await API.createTransaction(formData);
                
                if (result.success) {
                    window.auth.showNotification('Deposit recorded successfully!', 'success');
                    closeModal('transactionModal');
                    
                    // Send WhatsApp notification
                    sendWhatsAppNotification(formData.memberId, formData.amount, result.totalSavings);
                    
                    // Refresh data
                    loadDashboardData();
                }
                
            } catch (error) {
                window.auth.showNotification(error.message, 'error');
            }
        }

            } catch (error) {
                console.error('Error sending WhatsApp notification:', error);

        // Generate report
        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const memberId = document.getElementById('reportMemberId').value;
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const format = document.getElementById('reportFormat').value;
            
            // Validate
            if (type === 'individual' && !memberId) {
                window.auth.showNotification('Please select a member', 'error');
                return;
            }
            
            try {
                let data;
                
                if (type === 'individual') {
                    data = await API.getIndividualReport(memberId);
                } else {
                    data = await API.getGroupReport();
                }
                
                // Export based on format
                if (format === 'csv') {
                    exportToCSV(data, `report-${type}-${new Date().toISOString().split('T')[0]}.csv`);
                } else if (format === 'excel') {
                    // For demo, use CSV
                    exportToCSV(data, `report-${type}-${new Date().toISOString().split('T')[0]}.xls`);
                } else {
                    // For PDF, open print dialog
                    printReport(data, type);
                }
                
                closeModal('reportModal');
                window.auth.showNotification('Report generated successfully!', 'success');
                
            } catch (error) {
                window.auth.showNotification(error.message, 'error');
            }
        }

        // Export data
        function exportData(format) {
            const data = {
                timestamp: new Date().toISOString(),
                exportedBy: window.auth.getUser()?.name
            };
            
            exportToCSV([data], `export-${new Date().toISOString().split('T')[0]}.${format}`);
        }

        // Export to CSV
        function exportToCSV(data, filename) {
            const csvContent = convertToCSV(data);
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Convert data to CSV
        function convertToCSV(data) {
            if (Array.isArray(data)) {
                if (data.length === 0) return '';
                const headers = Object.keys(data[0]);
                const rows = data.map(obj => headers.map(header => JSON.stringify(obj[header] || '')).join(','));
                return [headers.join(','), ...rows].join('\n');
            } else {
                return JSON.stringify(data, null, 2);
            }
        }

        // Get days ago string
        function getDaysAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            return `${Math.floor(diffDays / 30)} months ago`;
        }
